syntax = "proto3";
package worldmonitor.webcam.v1;

message ListWebcamsRequest {
  int32 zoom = 1;
  double bound_w = 2;
  double bound_s = 3;
  double bound_e = 4;
  double bound_n = 5;
}

message WebcamEntry {
  string webcam_id = 1;
  string title = 2;
  double lat = 3;
  double lng = 4;
  string category = 5;
  string country = 6;
}

message WebcamCluster {
  double lat = 1;
  double lng = 2;
  int32 count = 3;
  repeated string categories = 4;
}

message ListWebcamsResponse {
  repeated WebcamEntry webcams = 1;
  repeated WebcamCluster clusters = 2;
  int32 total_in_view = 3;
}
