retailer:
  slug: migros_ch
  name: Migros Switzerland
  marketCode: ch
  currencyCode: CHF
  adapter: search
  baseUrl: https://www.migros.ch
  enabled: true

  searchConfig:
    numResults: 5
    urlPathContains: /de/produkt/
    queryTemplate: "{canonicalName} Lebensmittel {market} {currency} Preis"

  rateLimit:
    requestsPerMinute: 10
    maxConcurrency: 1
    delayBetweenRequestsMs: 6000

  discovery:
    mode: search
    maxPages: 20
    seeds: []
