retailer:
  slug: sainsburys_gb
  name: Sainsbury's UK
  marketCode: gb
  currencyCode: GBP
  adapter: search
  baseUrl: https://groceries.sainsburys.co.uk
  enabled: true

  searchConfig:
    numResults: 5
    queryTemplate: "{canonicalName} grocery {market} {currency} price"

  rateLimit:
    requestsPerMinute: 15
    maxConcurrency: 1
    delayBetweenRequestsMs: 4000

  discovery:
    mode: search
    maxPages: 20
    seeds: []
